<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <!-- * CSS LINK -->
   <!-- We want to link html to css and run sass -->
   <link rel="stylesheet" href="./styles/style.css">

   <!-- * BOOTSTRAP ICONS LINK -->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body>
   <!-- * Layout -->
   <div class="layout">
      <!-- *Aside -->
      <aside>
         <!-- Logo -->
         <figure>
            <img src="./assets/images/logo.png" alt="">
            <span>Spotify</span>
         </figure>

         <!-- Navigation -->
         <nav>
            <a href="#">
               <i class="bi bi-house"></i>
               <span>Homepage</span>
            </a>
            <a href="#">
               <i class="bi bi-search"></i>
               <span>Search</span>
            </a>
            <a href="#">
               <i class="bi bi-collection"></i>
               <span>Libraries</span>
            </a>
            <a href="#">
               <i class="bi bi-music-note-list"></i>
               <span>Playlists</span>
            </a>
            <a href="#">
               <i class="bi bi-heart-fill"></i>
               <span>Favorites</span>
            </a>
         </nav>

      </aside>
      <!-- *Main -->
      <main>
         <!-- Header -->
         <header>
            <form>
               <input type="text" placeholder="Search for songs,...">
               <button type="submit"><i class="bi bi-search"></i></button>
            </form>

            <!-- nav -->
            <nav>
               <a href="#">Premium</a>
               <a href="#">support</a>
               <a href="#">Log In</a>
            </nav>
         </header>

         <!-- CONTENT -->
         <section>
            <!-- Title -->
            <h2 id="section-title">Popular Songs</h2>

            <!-- MUSIC LIST GRID -->
            <div id="music-list">
               <!-- &Music Card -->
               <div class="card">

               </div>
            </div>
         </section>
      </main>


   </div>

   <!-- * Player -->
   <div class="player">
      <!-- info -->
      <div class="info">
         <img src="./assets/images/logo.png" alt="music-image" id="music-image">
         <div>
            <h5 id="song-title">No Surprise</h5>
            <p id="song-artist">Warhaus</p>
         </div>
      </div>
      <!-- audio -->
      <audio src="./assets/sound/JAVASCRIPT_projects_3_spotifyclone_assets_music_sound.mp3" controls></audio>
      <!-- icons -->
      <div class="icons"></div>
      <i class="bi bi-boombox"></i>
      <i class="bi bi-music-note-list"></i>
      <i class="bi bi-pc-display"></i>
   </div>


   <script src="./js/main.js" type="module"></script>

</body>




</html>
